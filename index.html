<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" sizes="any" href="/personal-logo-light.svg" />
    <link rel="apple-touch-icon" href="/personal-logo-light.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danar IT Portfolio</title>
    <script>
      const favicon = document.querySelector('link[rel="icon"]');
      const appleIcon = document.querySelector('link[rel="apple-touch-icon"]');
      const darkMatcher = window.matchMedia('(prefers-color-scheme: dark)');
      const updateFavicon = (e) => {
        const light = '/personal-logo-light.svg';
        const dark = '/personal-logo-dark.svg';
        favicon.href = e.matches ? dark : light;
        appleIcon.href = e.matches ? dark : light;
      };
      updateFavicon(darkMatcher);
      darkMatcher.addEventListener('change', updateFavicon);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
